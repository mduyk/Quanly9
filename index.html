<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>DELTA ADMIN - QUẢN LÝ</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background:#0a0a0a; color:#eee; font-family:sans-serif; padding:10px; margin:0; }
        .box { background:#111; border:1px solid #333; padding:15px; border-radius:10px; margin-bottom:15px; }
        table { width:100%; border-collapse:collapse; font-size:12px; }
        th, td { border:1px solid #222; padding:8px; text-align:left; }
        button { cursor:pointer; padding:6px 12px; border:none; border-radius:4px; font-weight:bold; }
        .btn-ok { background:#00ff88; color:#000; }
        .btn-del { background:#ff4444; color:#fff; }
        input { background:#000; color:#fff; border:1px solid #333; padding:6px; border-radius:4px; width:80px; }
    </style>
</head>
<body>
    <div style="max-width:800px; margin:auto;">
        <h2>SẾP TỔNG - DASHBOARD</h2>
        <div class="box">
            <h3>💰 DUYỆT NẠP TIỀN</h3>
            <table>
                <thead><tr><th>Khách</th><th>Số Tiền</th><th>Shop</th><th>Lệnh</th></tr></thead>
                <tbody id="list-nap"></tbody>
            </table>
        </div>
        <div class="box">
            <h3>👥 QUẢN LÝ VÍ & BAN</h3>
            <table>
                <thead><tr><th>Tên User</th><th>Số Dư</th><th>Lệnh</th></tr></thead>
                <tbody id="list-users"></tbody>
            </table>
        </div>
    </div>

<script>
    const config = { apiKey: "AIzaSyBk6R1TDZeAxh37JQLgL_6Wl0v8m8Sg0", databaseURL: "https://shopctv-61f96-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(config); const db = firebase.database();

    db.ref('bank_requests').on('value', s => {
        const b = document.getElementById('list-nap'); b.innerHTML = "";
        s.forEach(c => {
            const d = c.val();
            if(d.status === 'Pending') {
                b.innerHTML += `<tr><td>${d.user}</td><td>${Number(d.amount).toLocaleString()}đ</td><td>${d.shop}</td>
                <td>
                    <button class="btn-ok" onclick="duyet('${d.id}','${d.user}','${d.amount}','${d.shop}','Success')">Duyệt</button>
                    <button class="btn-del" onclick="duyet('${d.id}','${d.user}','0','${d.shop}','Fail')">Hủy</button>
                </td></tr>`;
            }
        });
    });

    function duyet(rid, u, amt, shop, st) {
        if(st === 'Success') db.ref(`${shop}/${u}/balance`).transaction(b => (b || 0) + Number(amt));
        db.ref(`bank_requests/${rid}`).update({status: st});
        db.ref(`history_pay/${u}/${rid}`).update({status: st});
    }

    db.ref('users_shop1').on('value', s => {
        const b = document.getElementById('list-users'); b.innerHTML = "";
        s.forEach(c => {
            const u = c.key, d = c.val();
            b.innerHTML += `<tr><td>${u}</td>
            <td><input type="number" value="${d.balance}" onchange="db.ref('users_shop1/${u}/balance').set(Number(this.value))"></td>
            <td>
                <button class="btn-del" onclick="db.ref('users_shop1/${u}/status').set('Banned')">Ban</button>
                <button class="btn-ok" onclick="db.ref('users_shop1/${u}/status').set('Active')">Mở</button>
            </td></tr>`;
        });
    });
</script>
</body>
</html>
